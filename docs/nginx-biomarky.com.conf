# Reference nginx config for biomarky.com (4 languages: en=8080, fr=8081, de=8082, ja=8083)
# This is the POST-certbot version (SSL lines added by certbot).
# When migrating to a new VPS:
#   1. Deploy the HTTP-only version from deploy-vps.md (two server blocks, no SSL lines)
#   2. Run: certbot --nginx -d biomarky.com -d www.biomarky.com --non-interactive --agree-tos -m {email}
#   3. Certbot will patch SSL into both blocks — result should match this file.
#
# Canonical domain: https://biomarky.com/ (non-www)
# www always 301-redirects to non-www on both HTTP and HTTPS.

# Redirect www → non-www (HTTP + HTTPS via certbot)
server {
    server_name www.biomarky.com;
    listen 80;
    return 301 https://biomarky.com$request_uri;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/biomarky.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/biomarky.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Main server — non-www only
server {
    server_name biomarky.com;

    location = / {
        if ($http_accept_language ~* "^ja") {
            return 302 /ja/index.html;
        }
        if ($http_accept_language ~* "^fr") {
            return 302 /fr/index.html;
        }
        if ($http_accept_language ~* "^de") {
            return 302 /de/index.html;
        }
        return 302 /index.html;
    }

    location /ja/ {
        proxy_pass http://127.0.0.1:8083/;
        proxy_set_header Host $host;
    }

    location /fr/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
    }

    location /de/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/biomarky.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/biomarky.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS redirect (certbot manages this block)
server {
    server_name biomarky.com www.biomarky.com;
    listen 80;
    return 301 https://biomarky.com$request_uri;
}
